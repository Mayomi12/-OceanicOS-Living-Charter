<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ω∞ OceanicOS — Search</title>
<style>
  :root{ --bg:#04141f; --panel:#061a26; --line:#12455f; --ink:#e8f6fb; --dim:#8fb3c4;
         --ok:#34d399; --info:#38bdf8; --warn:#fbbf24; --err:#fb7185; }
  *{box-sizing:border-box}
  body{font-family:Consolas,ui-monospace,monospace;background:var(--bg);color:var(--ink);margin:0;line-height:1.55}
  header{padding:16px 22px;border-bottom:1px solid var(--line);display:flex;flex-wrap:wrap;gap:10px;align-items:baseline;justify-content:space-between}
  header h1{font-size:17px;margin:0}
  header .v{color:var(--dim);font-size:12px}
  main{max-width:760px;margin:auto;padding:20px 22px}
  #row{display:flex;gap:10px}
  #q{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:8px;color:var(--ink);
     font-family:inherit;font-size:15px;padding:10px 12px}
  #q:focus{outline:none;border-color:var(--info)}
  button,select{font-family:inherit;font-size:12px;background:var(--panel);color:var(--ink);border:1px solid var(--line);
         border-radius:8px;padding:8px 14px;cursor:pointer}
  #filters{display:flex;gap:10px;margin-top:10px;align-items:center;color:var(--dim);font-size:12px;flex-wrap:wrap}
  #meta{margin:14px 0 6px;color:var(--dim);font-size:12px}
  .hit{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:10px 14px;margin-bottom:10px}
  .hit .top{display:flex;gap:8px;align-items:baseline;flex-wrap:wrap;font-size:11px;color:var(--dim)}
  .hit .id{color:var(--info)}
  .hit .type{text-transform:uppercase;letter-spacing:.05em}
  .hit .score{margin-left:auto}
  .hit .text{margin-top:4px;font-size:13px}
  .hit mark{background:none;color:var(--warn);font-weight:bold}
  .empty{color:var(--dim);font-style:italic;margin-top:16px}
  #sug{color:var(--dim);font-size:11px;min-height:16px;margin-top:6px}
  #sug b{color:var(--info);cursor:pointer}
  footer{color:var(--dim);font-size:12px;padding:14px 22px;border-top:1px solid var(--line);text-align:center}
</style>
</head>
<body>
<header>
  <h1>Ω♾️V :: ƆCEANiC_OS — Search</h1>
  <div class="v"><span id="stats">–</span></div>
</header>
<main>
  <div id="row">
    <input id="q" autocomplete="off" spellcheck="false" placeholder="search the ocean… (try: tide)" autofocus />
    <button id="go">Search</button>
  </div>
  <div id="sug"></div>
  <div id="filters">
    type <select id="ftype"><option value="">any</option><option>observation</option><option>decision</option><option>knowledge</option><option>project</option><option>build</option></select>
    status <select id="fstatus"><option value="">any</option><option>pending</option><option>verified</option><option>rejected</option><option>established</option><option>active</option><option>decided</option><option>open</option></select>
    <button id="seed">Seed sample drops</button>
  </div>
  <div id="meta"></div>
  <div id="hits"></div>
</main>
<footer>Search finds; it never fabricates. Every result is a real record of the ocean. — zero-runtime, in your browser.</footer>

<script src="verify-engine.js"></script>
<script src="heartbeat.js"></script>
<script src="memory.js"></script>
<script src="reality-engine.js"></script>
<script src="decision-engine.js"></script>
<script src="knowledge-engine.js"></script>
<script src="projects-engine.js"></script>
<script src="build-registry.js"></script>
<script src="oceanic.js"></script>
<script src="logger.js"></script>
<script src="search.js"></script>
<script>
"use strict";
var os = OceanicCore.createOceanic({ manual: true, name: "search" });
var search = OceanicCore.createSearch({ oceanic: os });
search.boot();

function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function highlight(text, matched){
  var out = esc(text);
  matched.forEach(function(t){
    out = out.replace(new RegExp("(" + t.replace(/[.*+?^${}()|[\]\\]/g,"\\$&") + ")","gi"), "<mark>$1</mark>");
  });
  return out;
}
function stats(){
  var s = search.status();
  document.getElementById("stats").textContent = s.indexed + " records indexed · " + s.terms + " terms · ocean " + os.status().memory.count;
}

function run(){
  var q = document.getElementById("q").value;
  var opts = {};
  if (document.getElementById("ftype").value) opts.type = document.getElementById("ftype").value;
  if (document.getElementById("fstatus").value) opts.status = document.getElementById("fstatus").value;
  var r = search.query(q, opts);
  var hits = document.getElementById("hits"); hits.innerHTML = "";
  var meta = document.getElementById("meta");
  if (!r.ok) { meta.textContent = ""; hits.innerHTML = '<div class="empty">' + esc(r.error) + "</div>"; stats(); return; }
  meta.textContent = r.total + " result" + (r.total === 1 ? "" : "s") + " for [" + r.terms.join(", ") + "]";
  if (!r.results.length) hits.innerHTML = '<div class="empty">Nothing in the ocean matches — yet. 💧</div>';
  r.results.forEach(function(h){
    var d = document.createElement("div"); d.className = "hit";
    d.innerHTML = '<div class="top"><span class="id">'+esc(h.id)+'</span><span class="type">'+esc(h.type)+
      '</span><span>'+esc(h.status)+'</span><span class="score">score '+h.score+'</span></div>'+
      '<div class="text">'+highlight(h.text, h.matched)+"</div>";
    hits.appendChild(d);
  });
  stats();
}

document.getElementById("go").addEventListener("click", run);
document.getElementById("q").addEventListener("keydown", function(e){ if(e.key==="Enter") run(); });
document.getElementById("q").addEventListener("input", function(){
  var v = this.value.trim().split(/\s+/).pop();
  var sug = document.getElementById("sug");
  if (!v) { sug.innerHTML = ""; return; }
  var s = search.suggest(v.toLowerCase()).slice(0, 8);
  sug.innerHTML = s.length ? "suggest: " + s.map(function(t){ return "<b>"+esc(t)+"</b>"; }).join("  ") : "";
});
document.getElementById("sug").addEventListener("click", function(e){
  if (e.target.tagName === "B") {
    var q = document.getElementById("q");
    var parts = q.value.trim().split(/\s+/); parts.pop(); parts.push(e.target.textContent);
    q.value = parts.join(" ") + " "; q.focus(); run();
  }
});

document.getElementById("seed").addEventListener("click", function(){
  var o1 = os.reality.observe({ observation: "the tide is rising fast in the north channel", source: "seed" });
  os.reality.observe({ observation: "harbor light flickers at dusk", source: "seed" });
  os.reality.verify(o1.meta.oid, "confirmed by the pilot");
  os.knowledge.learn({ statement: "tides follow the moon", topics: ["tides","moon"], source: "seed" });
  os.decisions.propose({ question: "reroute the ferry around the north channel?", options: ["yes","no"], source: "seed" });
  os.projects.open({ name: "Winter routing for the north passage", source: "seed" });
  stats(); run();
});

stats();
</script>
</body>
</html>
