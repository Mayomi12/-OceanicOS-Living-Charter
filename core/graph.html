<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ω∞ OceanicOS — Knowledge Graph</title>
<style>
  :root{ --bg:#04141f; --panel:#061a26; --line:#12455f; --ink:#e8f6fb; --dim:#8fb3c4;
         --ok:#34d399; --info:#38bdf8; --warn:#fbbf24; --err:#fb7185; --violet:#a78bfa; }
  *{box-sizing:border-box}
  body{font-family:Consolas,ui-monospace,monospace;background:var(--bg);color:var(--ink);margin:0;line-height:1.5}
  header{padding:14px 22px;border-bottom:1px solid var(--line);display:flex;flex-wrap:wrap;gap:10px;align-items:baseline;justify-content:space-between}
  header h1{font-size:16px;margin:0}
  header .v{color:var(--dim);font-size:12px}
  main{display:grid;grid-template-columns:2fr 1fr;gap:0;height:calc(100vh - 130px)}
  @media(max-width:800px){ main{grid-template-columns:1fr;height:auto} }
  #view{position:relative;overflow:hidden}
  svg{width:100%;height:100%;display:block}
  line{stroke:#12455f;stroke-width:1.2}
  circle{cursor:pointer;stroke:var(--bg);stroke-width:1.5}
  text{font-family:Consolas,monospace;font-size:9px;fill:var(--dim);pointer-events:none}
  aside{border-left:1px solid var(--line);background:var(--panel);padding:14px 16px;overflow:auto}
  aside h2{font-size:12px;margin:0 0 10px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em}
  #detail .lbl{font-size:13px;margin:6px 0}
  #detail .meta{font-size:11px;color:var(--dim)}
  .nb{background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:6px 10px;margin:6px 0;font-size:11px;cursor:pointer}
  .nb:hover{border-color:var(--info)}
  .nb .kind{color:var(--warn)}
  .empty{color:var(--dim);font-style:italic;font-size:12px}
  footer{color:var(--dim);font-size:11px;padding:10px 22px;border-top:1px solid var(--line);display:flex;gap:16px;flex-wrap:wrap;align-items:center}
  footer .dot{display:inline-block;width:8px;height:8px;border-radius:4px;margin-right:5px;vertical-align:middle}
  button{font-family:inherit;font-size:11px;background:var(--panel);color:var(--ink);border:1px solid var(--line);border-radius:6px;padding:5px 12px;cursor:pointer}
  button:hover{border-color:var(--info)}
</style>
</head>
<body>
<header>
  <h1>Ω♾️V :: ƆCEANiC_OS — Knowledge Graph</h1>
  <div class="v"><span id="stats">–</span> <button id="seed">Seed sample ocean</button></div>
</header>
<main>
  <div id="view"><svg id="svg" viewBox="0 0 800 560" preserveAspectRatio="xMidYMid meet"></svg></div>
  <aside>
    <h2>Node</h2>
    <div id="detail"><div class="empty">Click a node to inspect it and walk its relationships.</div></div>
  </aside>
</main>
<footer>
  <span><span class="dot" style="background:#a78bfa"></span>topic</span>
  <span><span class="dot" style="background:#34d399"></span>knowledge</span>
  <span><span class="dot" style="background:#38bdf8"></span>observation</span>
  <span><span class="dot" style="background:#fbbf24"></span>decision</span>
  <span><span class="dot" style="background:#fb7185"></span>project</span>
  <span><span class="dot" style="background:#8fb3c4"></span>build</span>
  <span>— derived from the one Memory Ocean; every edge is a declared relationship.</span>
</footer>

<script src="verify-engine.js"></script>
<script src="heartbeat.js"></script>
<script src="memory.js"></script>
<script src="reality-engine.js"></script>
<script src="decision-engine.js"></script>
<script src="knowledge-engine.js"></script>
<script src="projects-engine.js"></script>
<script src="build-registry.js"></script>
<script src="oceanic.js"></script>
<script src="logger.js"></script>
<script src="graph.js"></script>
<script>
"use strict";
var os = OceanicCore.createOceanic({ manual: true, name: "graph" });
var graph = OceanicCore.createGraph({ oceanic: os });
graph.boot();

var COLORS = { topic:"#a78bfa", knowledge:"#34d399", observation:"#38bdf8", decision:"#fbbf24", project:"#fb7185", build:"#8fb3c4" };
var RINGS  = { topic:60, knowledge:120, observation:185, decision:245, project:245, build:245 };
var svg = document.getElementById("svg");
var positions = {};

function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function stats(){
  var s = graph.stats();
  document.getElementById("stats").textContent = s.nodes + " nodes · " + s.edges + " edges · ocean " + os.status().memory.count;
}

function layout(){
  positions = {};
  var cx = 400, cy = 280;
  var byRing = {};
  graph.nodes().forEach(function(n){
    var r = RINGS[n.type] || 245;
    if (!byRing[r]) byRing[r] = [];
    byRing[r].push(n);
  });
  Object.keys(byRing).forEach(function(r){
    var ring = byRing[r];
    ring.forEach(function(n, i){
      var a = (2 * Math.PI * i) / ring.length - Math.PI / 2;
      positions[n.id] = { x: cx + Number(r) * Math.cos(a), y: cy + Number(r) * Math.sin(a) };
    });
  });
}

function draw(){
  layout();
  var parts = [];
  graph.edges().forEach(function(e){
    var a = positions[e.from], b = positions[e.to];
    if (a && b) parts.push('<line x1="'+a.x+'" y1="'+a.y+'" x2="'+b.x+'" y2="'+b.y+'"><title>'+esc(e.kind)+"</title></line>");
  });
  graph.nodes().forEach(function(n){
    var p = positions[n.id];
    parts.push('<circle data-id="'+esc(n.id)+'" cx="'+p.x+'" cy="'+p.y+'" r="9" fill="'+(COLORS[n.type]||"#8fb3c4")+'"><title>'+esc(n.type+": "+n.label)+"</title></circle>");
    var short = n.label.length > 18 ? n.label.slice(0,17)+"…" : n.label;
    parts.push('<text x="'+(p.x+11)+'" y="'+(p.y+3)+'">'+esc(short)+"</text>");
  });
  svg.innerHTML = parts.join("");
  stats();
}

function inspect(id){
  var n = graph.node(id);
  if (!n) return;
  var d = document.getElementById("detail");
  var html = '<div class="lbl">'+esc(n.label)+'</div>'+
             '<div class="meta">'+esc(n.id)+" · "+esc(n.type)+" · "+esc(n.status)+" · degree "+n.degree+"</div>";
  var nbs = graph.neighbors(id);
  html += "<h2 style='margin-top:14px'>Neighbors ("+nbs.length+")</h2>";
  if (!nbs.length) html += '<div class="empty">No declared relationships — this record is open water.</div>';
  nbs.forEach(function(nb){
    html += '<div class="nb" data-id="'+esc(nb.id)+'"><span class="kind">'+esc(nb.direction==="out"?"—"+nb.kind+"→":"←"+nb.kind+"—")+
            "</span> "+esc(nb.label)+' <span style="color:var(--dim)">('+esc(nb.type)+")</span></div>";
  });
  d.innerHTML = html;
}

svg.addEventListener("click", function(e){
  var id = e.target.getAttribute && e.target.getAttribute("data-id");
  if (id) inspect(id);
});
document.getElementById("detail").addEventListener("click", function(e){
  var el = e.target.closest ? e.target.closest(".nb") : null;
  if (el) inspect(el.getAttribute("data-id"));
});

document.getElementById("seed").addEventListener("click", function(){
  var o1 = os.reality.observe({ observation: "the tide is rising in the north channel", source: "seed" });
  var o2 = os.reality.observe({ observation: "the harbor light flickers at dusk", source: "seed" });
  os.reality.verify(o1.meta.oid, "pilot confirmed");
  var k1 = os.knowledge.learn({ statement: "tides follow the moon", topics: ["tides","moon"], grounds: [o1.meta.oid], source: "seed" });
  os.knowledge.learn({ statement: "spring tides are the strongest", topics: ["tides"], source: "seed" });
  var d1 = os.decisions.propose({ question: "reroute the ferry?", options: ["yes","no"], grounds: [o1.meta.oid], source: "seed" });
  os.decisions.decide(d1.meta.did, "yes", "safety first");
  var p = os.projects.open({ name: "Winter routing", source: "seed" });
  os.projects.link(p.meta.pid, { kind: "observation", id: o2.meta.oid });
  os.projects.link(p.meta.pid, { kind: "knowledge", id: k1.meta.kid });
  draw();
});

draw();
</script>
</body>
</html>
