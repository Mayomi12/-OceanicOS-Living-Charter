<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#04141f" />
<title>Ω∞ OceanicOS — Mobile</title>
<style>
  :root{ --bg:#04141f; --panel:#061a26; --line:#12455f; --ink:#e8f6fb; --dim:#8fb3c4; --ok:#34d399; --info:#38bdf8; --warn:#fbbf24; }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--ink);font-family:Consolas,ui-monospace,monospace}
  header{position:sticky;top:0;background:var(--bg);padding:14px 16px calc(14px + env(safe-area-inset-top));border-bottom:1px solid var(--line)}
  header h1{font-size:16px;margin:0} header .s{color:var(--dim);font-size:12px}
  main{padding:14px 16px 96px;max-width:560px;margin:auto}
  .tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
  .tile{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px;text-align:center}
  .tile .n{font-size:20px;font-weight:bold;color:var(--info)} .tile .l{font-size:10px;color:var(--dim)}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:12px}
  .card h2{font-size:12px;margin:0 0 8px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em}
  input,button,select{font-family:inherit;font-size:15px;border-radius:10px;border:1px solid var(--line);background:#04141f;color:var(--ink);padding:11px 12px}
  input,select{width:100%} button{background:#0c2c3d;color:var(--ink);width:100%;margin-top:8px} button:active{background:#12455f}
  .row{display:flex;gap:8px} .row>*{flex:1}
  #feed{list-style:none;margin:0;padding:0;font-size:12px;max-height:150px;overflow:auto}
  #feed li{padding:3px 0;border-bottom:1px solid #0c2c3d;color:var(--dim)}
  .msg{font-size:12px;color:var(--ok);min-height:16px;margin-top:6px}
  .msg.warn{color:var(--warn)}
  footer{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--line);display:flex;padding:8px 12px calc(8px + env(safe-area-inset-bottom))}
  footer input{flex:1} footer button{width:auto;margin:0 0 0 8px;padding:11px 16px}
</style>
</head>
<body>
<header>
  <h1>Ω♾️V — OceanicOS Mobile</h1>
  <div class="s">offline-capable · your ocean is saved on this device</div>
</header>
<main>
  <div class="tiles">
    <div class="tile"><div class="n" id="t-ocean">0</div><div class="l">records</div></div>
    <div class="tile"><div class="n" id="t-verified">0</div><div class="l">verified</div></div>
    <div class="tile"><div class="n" id="t-know">0</div><div class="l">knowledge</div></div>
  </div>

  <div class="card">
    <h2>Session</h2>
    <div class="row">
      <button id="save">Save</button>
      <button id="load">Restore</button>
    </div>
    <div class="msg" id="msg">&nbsp;</div>
  </div>

  <div class="card">
    <h2>Activity</h2>
    <ul id="feed"></ul>
  </div>
</main>
<footer>
  <input id="line" autocomplete="off" spellcheck="false" placeholder="observe the tide is rising…" />
  <button id="run">Run</button>
</footer>

<script src="verify-engine.js"></script>
<script src="heartbeat.js"></script>
<script src="memory.js"></script>
<script src="reality-engine.js"></script>
<script src="decision-engine.js"></script>
<script src="knowledge-engine.js"></script>
<script src="projects-engine.js"></script>
<script src="build-registry.js"></script>
<script src="oceanic.js"></script>
<script src="api.js"></script>
<script src="cli.js"></script>
<script src="logger.js"></script>
<script src="harbor.js"></script>
<script src="store.js"></script>
<script>
"use strict";
var SLOT = "mobile-session";
var STORAGE_KEY = "oceanicos.mobile";

function hasLocal(){ try { return !!window.localStorage; } catch (e) { return false; } }
var store = hasLocal() ? OceanicCore.createStore({ backend: window.localStorage, namespace: "oceanic.mobile" }) : null;

// build a system; if a saved snapshot exists, hydrate Memory from it on boot
function bootSystem(){
  var seed = null;
  if (store && store.has(SLOT)) {
    var snap = store.load(SLOT);
    seed = { getItem: function(k){ return k === STORAGE_KEY ? snap : null; }, setItem: function(){} };
  }
  return OceanicCore.createOceanic({ manual: true, name: "mobile", storage: seed, storageKey: STORAGE_KEY });
}
var harbor = OceanicCore.createHarbor({ oceanic: bootSystem() });

function paint(d){
  d = d || harbor.dashboard();
  document.getElementById("t-ocean").textContent = d.ocean;
  document.getElementById("t-verified").textContent = d.engines.reality.verified;
  document.getElementById("t-know").textContent = d.engines.knowledge.established;
  var feed = document.getElementById("feed"); feed.innerHTML = "";
  d.activity.slice().reverse().forEach(function(a){ var li = document.createElement("li"); li.textContent = a.message; feed.appendChild(li); });
}
function say(text, warn){ var m = document.getElementById("msg"); m.textContent = text; m.className = "msg" + (warn ? " warn" : ""); }

paint(harbor.boot());
if (store && store.has(SLOT)) say("Restored your saved ocean.");
else if (!store) say("This device has no local storage — saving is disabled.", true);

document.getElementById("run").addEventListener("click", runLine);
document.getElementById("line").addEventListener("keydown", function(e){ if (e.key === "Enter") runLine(); });
function runLine(){
  var el = document.getElementById("line"); var v = el.value.trim();
  if (!v) return;
  var r = harbor.exec(v);
  paint(r.dashboard);
  say(r.ok ? (r.message || "ok") : ("! " + r.error), !r.ok);
  el.value = "";
}

document.getElementById("save").addEventListener("click", function(){
  if (!store) return say("Local storage unavailable.", true);
  var r = store.save(SLOT, harbor.oceanic.exportSnapshot());
  say(r.ok ? ("Saved " + r.bytes + " bytes to this device.") : ("Save failed: " + r.error), !r.ok);
});
document.getElementById("load").addEventListener("click", function(){
  if (!store || !store.has(SLOT)) return say("Nothing saved yet.", true);
  harbor = OceanicCore.createHarbor({ oceanic: bootSystem() });
  paint(harbor.boot());
  say("Restored your saved ocean.");
});
</script>
</body>
</html>
