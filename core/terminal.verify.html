<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Ω∞ Core Verification — Terminal</title>
<style>
  body{font-family:Consolas,monospace;background:#04141f;color:#e8f6fb;padding:30px;max-width:880px;margin:auto}
  h1{font-size:18px} h2{font-size:15px;margin-top:30px;color:#8fb3c4} .sub{color:#8fb3c4;font-size:13px}
  table{border-collapse:collapse;width:100%;margin-top:14px}
  td,th{border:1px solid #12455f;padding:8px 12px;font-size:13px;text-align:left}
  .pass{color:#34d399;font-weight:bold} .fail{color:#fb7185;font-weight:bold}
  .verdict{margin-top:16px;font-size:15px;font-weight:bold}
  .note{color:#8fb3c4;font-size:12px;margin-top:8px;font-style:italic}
</style>
</head>
<body>
<h1>Ω∞ OceanicOS :: Core Verification</h1>
<div class="sub">Capability under test: <b>Terminal</b> (build 0023, Stage 3 · Applications). A REPL controller — scrollback, history navigation, Tab completion. Suite runs on the <b>Verification Engine</b> (0004).</div>
<div id="suite"></div>
<div class="note">The full-screen Terminal app is <a href="terminal.html" style="color:#38bdf8">terminal.html</a> — this page verifies its logic.</div>

<script src="verify-engine.js"></script>
<script src="heartbeat.js"></script>
<script src="memory.js"></script>
<script src="reality-engine.js"></script>
<script src="decision-engine.js"></script>
<script src="knowledge-engine.js"></script>
<script src="projects-engine.js"></script>
<script src="build-registry.js"></script>
<script src="oceanic.js"></script>
<script src="cli.js"></script>
<script src="terminal.js"></script>
<script>
"use strict";
var clock = (function(){ var t=1000; return function(){ return (t+=10); }; })();
function newTerm(){ return OceanicCore.createTerminal({ cli: OceanicCore.createCLI({ oceanic: OceanicCore.createOceanic({ now: clock, manual: true, name: "term-test" }) }) }); }

var suite = OceanicCore.createVerifier({ name: "Terminal (build 0023)" });

suite.test("factory requires a CLI or an assembled system; publishes BUILTINS", function(a){
  a.equal(typeof OceanicCore.createTerminal, "function");
  a.throws(function(){ OceanicCore.createTerminal({}); }, "nothing to wrap");
  a.throws(function(){ OceanicCore.createTerminal({ cli: {} }); }, "not a CLI");
  a.deepEqual(OceanicCore.createTerminal.BUILTINS, ["clear","history"]);
  var t = newTerm();
  ["submit","historyPrev","historyNext","complete","vocabulary","scrollback","history","status"].forEach(function(fn){
    a.equal(typeof t[fn], "function", "exposes " + fn);
  });
});

suite.test("submit() records the input and the command's output in the scrollback", function(a){
  var t = newTerm();
  var r = t.submit("start");
  a.equal(r.ok, true);
  var sb = t.scrollback();
  a.equal(sb[0].type, "in");
  a.ok(sb[0].text.indexOf("start") >= 0);
  a.equal(sb[sb.length - 1].type, "out");
  a.ok(sb[sb.length - 1].text.indexOf("booted") >= 0);
});

suite.test("a failed command writes an error line and never throws", function(a){
  var t = newTerm();
  var r = t.submit("frobnicate the sail");
  a.equal(r.ok, false);
  var last = t.scrollback()[t.scrollback().length - 1];
  a.equal(last.type, "err");
  a.ok(last.text.indexOf("unknown command") >= 0);
});

suite.test("blank submissions are no-ops", function(a){
  var t = newTerm();
  var r = t.submit("   ");
  a.equal(r.blank, true);
  a.equal(t.scrollback().length, 0);
  a.equal(t.history().length, 0);
});

suite.test("history records submitted commands in order", function(a){
  var t = newTerm();
  t.submit("start"); t.submit("status"); t.submit("help");
  a.deepEqual(t.history(), ["start","status","help"]);
});

suite.test("historyPrev/historyNext walk the history shell-style", function(a){
  var t = newTerm();
  t.submit("a1"); t.submit("b2"); t.submit("c3"); // (all unknown commands, but recorded)
  a.equal(t.historyPrev(), "c3", "first prev = newest");
  a.equal(t.historyPrev(), "b2");
  a.equal(t.historyPrev(), "a1");
  a.equal(t.historyPrev(), "a1", "clamps at the oldest");
  a.equal(t.historyNext(), "b2");
  a.equal(t.historyNext(), "c3");
  a.equal(t.historyNext(), "", "past the newest is an empty line");
});

suite.test("submitting resets the history cursor to the end", function(a){
  var t = newTerm();
  t.submit("one"); t.submit("two");
  t.historyPrev(); t.historyPrev();      // walked back to "one"
  t.submit("three");                      // new submit resets
  a.equal(t.historyPrev(), "three", "prev after a submit starts from the newest again");
});

suite.test("complete() offers unique, common-prefix, and empty completions", function(a){
  var t = newTerm();
  a.deepEqual(t.complete("veri"), { matches: ["verify"], value: "verify" }, "unique completion");
  var o = t.complete("o");
  a.deepEqual(o.matches, ["observations","observe"], "multiple matches");
  a.equal(o.value, "observ", "value is the common prefix");
  a.deepEqual(t.complete("zzz"), { matches: [], value: "zzz" }, "no match leaves input as-is");
});

suite.test("completion includes the terminal built-ins", function(a){
  var t = newTerm();
  a.deepEqual(t.complete("cl"), { matches: ["clear"], value: "clear" });
  a.ok(t.vocabulary().indexOf("history") >= 0 && t.vocabulary().indexOf("clear") >= 0);
});

suite.test("the clear built-in empties the scrollback (but keeps history)", function(a){
  var t = newTerm();
  t.submit("start"); t.submit("status");
  a.ok(t.scrollback().length > 0);
  t.submit("clear");
  a.equal(t.scrollback().length, 0, "screen cleared");
  a.equal(t.history().length, 3, "clear is itself remembered in history");
});

suite.test("the history built-in prints past commands", function(a){
  var t = newTerm();
  t.submit("start"); t.submit("status");
  var r = t.submit("history");
  a.deepEqual(r.data, ["start","status","history"]);
  var printed = t.scrollback().filter(function(l){ return l.type === "out"; });
  a.ok(printed.length >= 3, "each past command printed");
});

suite.test("real commands still drive the system through the terminal", function(a){
  var t = newTerm();
  t.submit("start");
  var r = t.submit("observe the north channel shoals");
  var oid = r.message.split(" ")[1];
  a.equal(t.submit("verify " + oid).ok, true);
  a.ok(t.submit("status").message.indexOf("reality 1") >= 0, "the observation was verified via the terminal");
});

/* ---- render the suite THROUGH the Verification Engine ---- */
var record = suite.renderTo(document.getElementById("suite"));
document.title = (record.verdict === "PASS" ? "✅" : "❌") + " Ω∞ Terminal";
try{ if(window.parent && window.parent!==window) window.parent.postMessage({ oceanicVerify:{ name:record.name, verdict:record.verdict, total:record.total, passed:record.passed, failed:record.failed } }, "*"); }catch(e){}
</script>
</body>
</html>
