<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ω∞ OceanicOS — Desktop</title>
<style>
  :root{ --bg:#02090e; --panel:#061a26; --line:#12455f; --ink:#e8f6fb; --dim:#8fb3c4; --ok:#34d399; --info:#38bdf8; }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0;overflow:hidden}
  body{font-family:Consolas,ui-monospace,monospace;background:
    radial-gradient(1200px 700px at 70% -10%, #0a2740 0%, var(--bg) 60%);color:var(--ink)}
  #desk{position:absolute;inset:0 0 46px 0;overflow:hidden}
  .win{position:absolute;width:560px;height:380px;background:var(--panel);border:1px solid var(--line);
       border-radius:10px;box-shadow:0 14px 40px rgba(0,0,0,.5);display:flex;flex-direction:column;min-width:280px;min-height:180px}
  .win.focused{border-color:#2f7fa6;box-shadow:0 18px 60px rgba(0,0,0,.6)}
  .titlebar{display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid var(--line);cursor:move;user-select:none}
  .titlebar .t{font-size:13px;color:var(--ink);flex:1}
  .titlebar button{border:0;background:#0c2c3d;color:var(--dim);border-radius:6px;width:22px;height:22px;cursor:pointer;font-size:12px}
  .titlebar button:hover{color:var(--ink)}
  iframe{flex:1;border:0;width:100%;background:var(--bg);border-radius:0 0 10px 10px}
  #dock{position:absolute;left:0;right:0;bottom:0;height:46px;background:rgba(4,20,31,.9);border-top:1px solid var(--line);
        display:flex;align-items:center;gap:8px;padding:0 12px}
  #dock .brand{color:var(--dim);font-size:12px;margin-right:8px}
  #dock button{border:1px solid var(--line);background:#04141f;color:var(--ink);border-radius:8px;padding:7px 12px;cursor:pointer;font-family:inherit;font-size:12px}
  #dock button.on{border-color:#2f7fa6;color:var(--ok)}
  #dock .sp{flex:1}
  #dock a{color:var(--info);text-decoration:none;font-size:12px}
</style>
</head>
<body>
<div id="desk"></div>
<div id="dock">
  <span class="brand">Ω♾️V :: ƆCEANiC_OS</span>
  <span id="apps"></span>
  <span class="sp"></span>
  <a href="README-none" id="chartlink">📜 Charter</a>
</div>

<script src="verify-engine.js"></script>
<script src="desktop.js"></script>
<script>
"use strict";
document.getElementById("chartlink").setAttribute("href", "../Ω∞ OceanicOS Living Charter.md");
var ws = OceanicCore.createWorkspace();
var desk = document.getElementById("desk");
var apps = document.getElementById("apps");
var wins = {};        // id -> window element
var loaded = {};      // id -> iframe has been given a src
var offsets = { harbor:[40,30], terminal:[110,70], docs:[180,50], verify:[250,90] };

function render(){
  var state = ws.state();
  state.panels.forEach(function(p){
    // dock button
    var btn = document.getElementById("dockbtn-" + p.id);
    if (!btn){
      btn = document.createElement("button"); btn.id = "dockbtn-" + p.id; btn.textContent = p.title;
      btn.onclick = function(){ ws.toggle(p.id); render(); };
      apps.appendChild(btn);
    }
    btn.className = p.open ? "on" : "";
    // window
    var w = wins[p.id];
    if (p.open && !w){ w = makeWindow(p); wins[p.id] = w; desk.appendChild(w); }
    if (!p.open && w){ w.remove(); delete wins[p.id]; delete loaded[p.id]; }
    if (p.open && w){
      w.style.zIndex = String(p.z + 10);
      w.classList.toggle("focused", p.focused);
      if (!loaded[p.id]){ w.querySelector("iframe").src = p.src; loaded[p.id] = true; }
    }
  });
}

function makeWindow(p){
  var w = document.createElement("div"); w.className = "win";
  var off = offsets[p.id] || [60,60];
  w.style.left = off[0] + "px"; w.style.top = off[1] + "px";
  var bar = document.createElement("div"); bar.className = "titlebar";
  var t = document.createElement("span"); t.className = "t"; t.textContent = p.title;
  var close = document.createElement("button"); close.textContent = "×";
  close.onclick = function(e){ e.stopPropagation(); ws.close(p.id); render(); };
  bar.appendChild(t); bar.appendChild(close);
  var frame = document.createElement("iframe"); frame.setAttribute("title", p.title);
  w.appendChild(bar); w.appendChild(frame);
  // focus on mousedown anywhere
  w.addEventListener("mousedown", function(){ if (ws.focused() !== p.id){ ws.focus(p.id); render(); } });
  // drag by titlebar
  bar.addEventListener("mousedown", function(e){
    if (e.target.tagName === "BUTTON") return;
    var sx = e.clientX, sy = e.clientY, ox = w.offsetLeft, oy = w.offsetTop;
    function mv(ev){ w.style.left = Math.max(0, ox + ev.clientX - sx) + "px"; w.style.top = Math.max(0, oy + ev.clientY - sy) + "px"; }
    function up(){ document.removeEventListener("mousemove", mv); document.removeEventListener("mouseup", up); }
    document.addEventListener("mousemove", mv); document.addEventListener("mouseup", up);
  });
  return w;
}

// open a starting layout
ws.open("docs"); ws.open("terminal"); ws.open("harbor");
render();
</script>
</body>
</html>
